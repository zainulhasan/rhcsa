{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  {% set social_title = config.site_name if (page.canonical_url or config.site_url) == config.site_url else page.title ~ " - " ~ config.site_name %}
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-240WHFQT1Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-240WHFQT1Z');
  </script>
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="author" content="Zainul Hasan">
  <meta name="keywords" content="RHCSA, EX200, Red Hat, RHEL, Linux administration, Linux course, RHCSA labs, RHCSA mock exam, system administration, Linux cheat sheet">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{{ social_title }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url or config.site_url }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ social_title }}">
  <meta name="twitter:description" content="{{ config.site_description }}">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "RHCSA Self-Study Course",
          "url": "https://zainulhasan.github.io/rhcsa/",
          "description": "RHCSA EX200 self-study course with Linux administration labs, cheat sheets, mock exams, troubleshooting, and offline help for RHEL-style systems."
        },
        {
          "@type": "Course",
          "name": "RHCSA Self-Study Course",
          "description": "A beginner-friendly RHCSA EX200 self-study course covering Linux administration, RHEL-style command-line practice, labs, mock exams, and offline help.",
          "provider": {
            "@type": "Person",
            "name": "Zainul Hasan"
          },
          "url": "https://zainulhasan.github.io/rhcsa/"
        }
      ]
    }
  </script>
{% endblock %}
